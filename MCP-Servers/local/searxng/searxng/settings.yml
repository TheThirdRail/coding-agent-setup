use_default_settings: true

general:
  debug: false
  instance_name: "Local SearXNG"

search:
  safe_search: 0
  autocomplete: "duckduckgo"
  formats:
    - html
    - json

server:
  secret_key: "replace-this-before-exposing-searxng-beyond-localhost"
  limiter: false
  image_proxy: true
  base_url: "http://localhost:8080/"

valkey:
  url: "valkey://valkey:6379/0"
